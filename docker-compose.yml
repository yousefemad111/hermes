# docker-compose.yml — Hermes Agent on Coolify (Tailscale + Telegram + Codex OAuth)
# Fix log:
#  - python-telegram-bot[webhooks] not in official image (gh#4915) — pip on boot
#  - Tailscale tag ACL mismatch — joins under user account (no advertise-tags)
#  - tailscaled hijacks all DNS via 100.100.100.100 — wrap entrypoint to
#    overwrite /etc/resolv.conf AFTER tailscaled starts so public lookups work

services:
  hermes-ts:
    image: tailscale/tailscale:latest
    container_name: hermes-ts
    hostname: hermes
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_ACCEPT_DNS: "false"
    volumes:
      - hermes-ts-state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
    # Force public DNS *after* containerboot launches tailscaled, by running
    # a tiny background watcher that rewrites resolv.conf whenever Tailscale
    # tries to replace it. We can't use docker's `dns:` directive because the
    # hermes container in shared netns can't see it.
    entrypoint:
      - /bin/sh
      - -c
      - |
        (
          while sleep 5; do
            grep -q '^nameserver 1\.1\.1\.1' /etc/resolv.conf 2>/dev/null && continue
            printf 'nameserver 1.1.1.1\nnameserver 8.8.8.8\n' > /etc/resolv.conf
          done
        ) &
        exec /usr/local/bin/containerboot

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    depends_on:
      - hermes-ts
    network_mode: service:hermes-ts
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
    command:
      - bash
      - -c
      - |
        /opt/hermes/.venv/bin/pip install --quiet 'python-telegram-bot[webhooks]' || true
        exec /opt/hermes/docker/entrypoint.sh gateway run
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  hermes-data:
    driver: local
  hermes-ts-state:
    driver: local
