# docker-compose.yml — Hermes Agent on Coolify (Tailscale + Telegram + Codex)
# Architecture: each container in its own netns on a shared bridge network.
# Tailscale Serve at hermes.fox-fish.ts.net proxies to hermes-agent:9119.

services:
  hermes-ts:
    image: tailscale/tailscale:latest
    container_name: hermes-ts
    hostname: hermes
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      - hermes-net
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_ACCEPT_DNS: "false"
    volumes:
      - hermes-ts-state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    hostname: hermes-agent
    restart: unless-stopped
    networks:
      - hermes-net
    expose:
      - "9119"
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
    # Use the image's default entrypoint + command. The image's CMD is empty
    # so pass the gateway args here. No bash wrapper, no double-start.
    command: ["gateway", "run"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-data:
    driver: local
  hermes-ts-state:
    driver: local
