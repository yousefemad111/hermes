# docker-compose.yml — Hermes Agent on Coolify (Tailscale + Telegram + Codex OAuth)
# Fixes applied:
#  - python-telegram-bot[webhooks] missing in official image (gh#4915) — pip on boot
#  - Tailscale tag ACL mismatch — joins under user account (no advertise-tags)
#  - DNS resolution broken via Tailscale namespace — force explicit resolvers
#    on the sidecar (the hermes container shares the sidecar's netns).

services:
  hermes-ts:
    image: tailscale/tailscale:latest
    container_name: hermes-ts
    hostname: hermes
    restart: unless-stopped
    # DNS resolvers are inherited by the hermes container (shared netns).
    # Tailscale's MagicDNS lookups still work; this just handles public names.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      # Stop Tailscale from rewriting /etc/resolv.conf — let our explicit
      # `dns:` entries above stand.
      TS_ACCEPT_DNS: "false"
    volumes:
      - hermes-ts-state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    depends_on:
      - hermes-ts
    network_mode: service:hermes-ts
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
    command:
      - bash
      - -c
      - |
        /opt/hermes/.venv/bin/pip install --quiet 'python-telegram-bot[webhooks]' || true
        exec /opt/hermes/docker/entrypoint.sh gateway run
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  hermes-data:
    driver: local
  hermes-ts-state:
    driver: local
