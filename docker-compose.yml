# docker-compose.yml — Hermes Agent on Coolify (Tailscale + Telegram + Codex)
# Architecture change: NO shared netns. Both containers on a private Docker
# network, each with their own DNS. Tailscale Serve proxies cross-container
# via the user-defined network's DNS.

services:
  # ─── Tailscale sidecar ─────────────────────────────────────────────────
  # Joins tailnet as "hermes". TS Serve proxies https://hermes.fox-fish.ts.net
  # to the hermes container at http://hermes:9119 (resolved via Docker's
  # user-defined network DNS — both containers can find each other by name).
  hermes-ts:
    image: tailscale/tailscale:latest
    container_name: hermes-ts
    hostname: hermes
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    networks:
      - hermes-net
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_ACCEPT_DNS: "false"   # don't let TS hijack DNS
    volumes:
      - hermes-ts-state:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro

  # ─── Hermes Agent ──────────────────────────────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    hostname: hermes-agent
    restart: unless-stopped
    networks:
      - hermes-net
    # Expose dashboard on the user-defined network so the TS sidecar can
    # proxy to it. NOT published to host — Tailscale handles ingress.
    expose:
      - "9119"
    volumes:
      - hermes-data:/opt/data
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
    command:
      - bash
      - -c
      - |
        /opt/hermes/.venv/bin/pip install --quiet 'python-telegram-bot[webhooks]' || true
        exec /opt/hermes/docker/entrypoint.sh gateway run
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-data:
    driver: local
  hermes-ts-state:
    driver: local
